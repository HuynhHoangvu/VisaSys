services:
  postgres:
    image: postgres:15-alpine
    container_name: fly-visa-db
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5435:5432"       # giữ nguyên port 5434 như .env của bạn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: fly-visa-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql://admin:admin123@postgres:5432/crm_db?schema=public"
      GCS_PROJECT_ID: "fly-data-490503"
      GCS_CLIENT_EMAIL: "flyvisa-storage-admin@fly-data-490503.iam.gserviceaccount.com"
      GCS_BUCKET_NAME: "flyvisa-documents"
      GCS_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nMIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQCqBGckmtSPk0/0\n...rLj0+I0GUAD3sptqWWPEhuo=\n-----END PRIVATE KEY-----\n"
      PORT: 3001
    volumes:
      - ./backend/uploads:/app/uploads   # giữ file upload không mất khi restart
    depends_on:
      postgres:
        condition: service_healthy       # chờ DB sẵn sàng mới start
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - node_modules/
            - uploads/
        - action: rebuild
          path: ./backend/package.json

  frontend:
    build:
      context: ./front-end
      dockerfile: dockerfile.dev
    container_name: fly-visa-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:3001"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./front-end
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./front-end/package.json
volumes:
  pgdata: