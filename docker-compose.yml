services:
  postgres:
    image: postgres:15-alpine
    container_name: fly-visa-db
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5435:5432"       # giữ nguyên port 5434 như .env của bạn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d crm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: fly-visa-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://admin:admin123@postgres:5432/crm_db?schema=public"
      NODE_ENV: production
      PORT: 3001
    volumes:
      - ./backend/uploads:/app/uploads   # giữ file upload không mất khi restart
    depends_on:
      postgres:
        condition: service_healthy       # chờ DB sẵn sàng mới start

  frontend:
    build:
      context: ./front-end
      dockerfile: dockerfile.dev
    container_name: fly-visa-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:3001"
    depends_on:
      - backend

volumes:
  pgdata: